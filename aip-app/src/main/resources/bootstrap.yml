spring:
  application:
    name: aip-app
  cloud:
    nacos:
      # 服务注册发现（config 已迁移至 application.yml spring.config.import，此处不再重复）
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:true}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        fail-fast: false
