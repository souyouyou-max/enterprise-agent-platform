spring:
  application:
    name: aip-gateway
  cloud:
    nacos:
      config:
        # 本地开发默认关闭 Nacos 配置拉取，避免覆盖本地 application.yml 路由导致 404。
        # 线上/联调如需启用，设置 NACOS_CONFIG_ENABLED=true。
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yml
        namespace: ${NACOS_NAMESPACE:}
        # 公共配置（所有服务共享）
        shared-configs:
          - data-id: common
            group: DEFAULT_GROUP
            refresh: true
        # 服务专属配置
        extension-configs:
          - data-id: aip-gateway
            group: DEFAULT_GROUP
            refresh: true
