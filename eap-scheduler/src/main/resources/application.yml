server:
  port: 8085

spring:
  application:
    name: eap-scheduler

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/eap_db
    username: ${DB_USERNAME:eap_user}
    password: ${DB_PASSWORD:eap_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

eap:
  audit:
    org-codes: ${AUDIT_ORG_CODES:ORG001}
    interval-seconds: ${AUDIT_INTERVAL_SECONDS:3600}
    initial-delay-seconds: ${AUDIT_INITIAL_DELAY_SECONDS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.enterprise.agent: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
