# ============================================================
# Nacos 公共配置 - Data ID: common.yml / Group: DEFAULT_GROUP
# 所有服务共享，修改后自动刷新（refresh: true）
# ============================================================

spring:
  # 数据库
  datasource:
    url: jdbc:oceanbase:oracle://${DB_HOST:localhost}:${DB_PORT:2883}/AIPTEST?useSSL=false
    username: ${DB_USERNAME:eap_user}
    password: ${DB_PASSWORD:eap_password}
    driver-class-name: com.oceanbase.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      initialization-fail-timeout: 1

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      connect-timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 0

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: eap-app-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.enterprise.agent.*"

  # AI 模型
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-placeholder}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.7
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.1
      embedding:
        enabled: false

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 业务公共配置
eap:
  llm:
    provider: ${LLM_PROVIDER:claude}
    cache-enabled: true
    cache-ttl-seconds: 3600
    timeout-seconds: 60
    openai:
      model: gpt-4o
    claude:
      model: claude-sonnet-4-6
    ollama:
      model: llama3.1
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  minio:
    # 注意：这里必须填写 **S3 API 端口**，不要填 MinIO Console 端口。
    # - API 默认端口常见为 9000
    # - Console 默认端口常见为 9001（填了会报：S3 API Requests must be made to API port）
    enabled: ${MINIO_ENABLED:false}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:bid-documents}

  # 围标串标（MinIO文件相似度）规则配置
  audit:
    collusive:
      minio:
        enabled: ${COLLUSIVE_MINIO_ENABLED:false}
        bucket: ${COLLUSIVE_MINIO_BUCKET:${eap.minio.bucket-name}}
        # 逗号/换行分隔的 objectPath 列表（不包含 bucket）
        # 示例：10001/xxx.pdf,10001/yyy.pdf
        objects: ${COLLUSIVE_MINIO_OBJECTS:}
        cosine-threshold: ${COLLUSIVE_COSINE_THRESHOLD:0.60}
        max-pairs: ${COLLUSIVE_MAX_PAIRS:500}
      python:
        enabled: ${COLLUSIVE_PYTHON_ENABLED:true}
        # Python 服务地址（FastAPI）
        base-url: ${BID_ANALYSIS_BASE_URL:http://localhost:8099}
        connect-timeout-ms: ${BID_ANALYSIS_CONNECT_TIMEOUT_MS:5000}
        read-timeout-ms: ${BID_ANALYSIS_READ_TIMEOUT_MS:120000}
        min-common-chars: ${COLLUSIVE_MIN_COMMON_CHARS:500}
        min-same-places: ${COLLUSIVE_MIN_SAME_PLACES:10}
        # 余弦相似度触发阈值（扫描件OCR不全时兜底）
        cosine-threshold: ${COLLUSIVE_COSINE_THRESHOLD:0.95}
        # 触发余弦判断所需最小文本长度（避免空文档误报）
        min-text-len-for-cosine: ${COLLUSIVE_MIN_TEXT_LEN_FOR_COSINE:30}
  security:
    enabled: ${SECURITY_ENABLED:false}
    jwt:
      secret: ${JWT_SECRET:eap-enterprise-agent-platform-jwt-secret-key-must-be-256-bits-long!!}
      expiration-ms: 86400000

# Feign 超时配置（OCR处理耗时较长）
feign:
  client:
    config:
      bid-analysis-service:
        connect-timeout: 5000
        read-timeout: 120000
