server:
  port: 8079

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: task-api
          uri: lb://eap-app
          predicates:
            - Path=/api/v1/tasks/**
        - id: knowledge-api
          uri: lb://eap-app
          predicates:
            - Path=/api/v1/knowledge/**
        - id: insight-api
          uri: lb://eap-app
          predicates:
            - Path=/api/v1/insight/**
        - id: chat-api
          uri: lb://eap-app
          predicates:
            - Path=/api/v1/chat/**
        - id: procurement-audit-api
          uri: lb://eap-app
          predicates:
            - Path=/api/v1/procurement-audit/**
        - id: risk-management-api
          uri: lb://eap-app
          predicates:
            - Path=/api/v1/risk-management/**
        - id: audit-engine-api
          uri: lb://eap-app
          predicates:
            - Path=/api/v1/audit-engine/**
        - id: enterprise-api
          uri: lb://eap-app
          predicates:
            - Path=/api/v1/enterprise/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:true}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        fail-fast: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.enterprise.agent: DEBUG
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
