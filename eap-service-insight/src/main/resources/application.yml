server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: eap-service-insight

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/eap_db
    username: ${DB_USERNAME:eap_user}
    password: ${DB_PASSWORD:eap_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 0

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-placeholder}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.7
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.1

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

eap:
  llm:
    provider: ${LLM_PROVIDER:openai}
    cache-enabled: true
    cache-ttl-seconds: 3600
    timeout-seconds: 60
    openai:
      model: gpt-4o
    claude:
      model: claude-sonnet-4-6
    ollama:
      model: llama3.1
      base-url: http://localhost:11434

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.enterprise.agent: DEBUG
    org.springframework.ai: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
