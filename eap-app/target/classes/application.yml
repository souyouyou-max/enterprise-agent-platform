server:
  port: 8081
  servlet:
    context-path: /

# 服务注册（公共配置已由 Nacos common.yml 提供，此处仅保留注册中心连接）
spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:true}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        fail-fast: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  show-actuator: false

feign:
  client:
    config:
      bid-analysis-service:
        connect-timeout: 5000
        read-timeout: 120000

logging:
  level:
    com.enterprise.agent: DEBUG
    org.springframework.ai: INFO
    org.springframework.kafka: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
