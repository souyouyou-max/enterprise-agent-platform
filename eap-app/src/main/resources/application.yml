server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: eap-app
  # Spring Boot 4.x 原生 Nacos 配置导入（不依赖 bootstrap 机制）
  config:
    import:
      - optional:nacos:common.yml
      - optional:nacos:eap-app.yml
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yml
        fail-fast: false
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:true}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        fail-fast: false
# 应用级配置（minio/security 使用 eap 前缀，与代码一致）
eap:
  business:
    chat:
      auto-ocr:
        # autoOcr 调用方式：direct=直接调用工具Bean；agent=通过 ToolRegistry 统一入口调用
        invoke-mode: direct
  llm:
    provider: openai
  tools:
    zhengyan:
      platform:
        enabled: true
        timeout-ms: 600000
        convert:
          mode: pure-java
          max-pages: 200
          dpi: 160
        img2text:
          max-images-per-call: 10
        # 通用 Header（两个接口共用）——凭证通过环境变量注入，禁止硬编码到代码/配置文件
        authorization: ${ZHENGYAN_AUTHORIZATION:}
        app-id: ${ZHENGYAN_APP_ID_PLATFORM:G209-test}
        # img2text 可选模型类型: AzureGPT-4o / AzureGPT4-turbo-vision
        default-model-type: ${ZHENGYAN_DEFAULT_MODEL_TYPE:qwen2-5-vl-72b-com}
        endpoints:
          img2text: ${ZHENGYAN_IMG2TEXT_ENDPOINT:http://10.8.192.80:17500/ability/multimodal/v2/img2text}
          professional-qa: ${ZHENGYAN_PROFESSIONAL_QA_ENDPOINT:https://zhengyan.sinosig.com/ai/ability/professional/v1/qa}
      text-classification:
        enabled: false
        # 正言语义文本分类接口地址（按实际文档填写）
        endpoint: ${ZHENGYAN_TEXT_CLASSIFICATION_ENDPOINT:}
        timeout-ms: 15000
        # 鉴权配置：默认 Authorization: Bearer <api-key>
        auth-header: ${ZHENGYAN_AUTH_HEADER:Authorization}
        auth-prefix: ${ZHENGYAN_AUTH_PREFIX:Bearer }
        api-key: ${ZHENGYAN_API_KEY:}
        # 若接口要求应用ID，可配置为对应 header（默认 X-App-Id）
        app-id: ${ZHENGYAN_APP_ID:}
        app-id-header: ${ZHENGYAN_APP_ID_HEADER:X-App-Id}
    dazhi:
      ocr:
        # 是否启用大智部通用OCR工具 DazhiOcrTool
        enabled: true
        # 通用OCR识别地址，对应原 external.ocr.generalOcrUrl
        general-url: https://bigdata-ocr-cluster.sinosig.com/general_recognition
        # appCode，默认沿用原项目常量，可按环境覆盖
        app-code: ${DAZHI_OCR_APP_CODE:G209-GHQ-CLM-JIHEFENGXIANJIQIREN}
        # HTTP 请求超时时间（毫秒）
        timeout-ms: ${DAZHI_OCR_TIMEOUT_MS:20000}
  http:
    # TCP 连接建立超时（毫秒），供 HttpClientConfig 使用
    connect-timeout-ms: 5000
    jackson:
      # MVC @RequestBody 解析（tools.jackson）单字符串最大长度，如 attachments.base64
      # 默认 20MB，base64 图片场景可通过环境变量调大，不建议超过 50MB（DoS 风险）
      max-string-length: ${JACKSON_MAX_STRING_LENGTH:20000000}
  minio:
    enabled: ${MINIO_ENABLED:true}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket-name: ${MINIO_BUCKET:test}
  security:
    enabled: ${SECURITY_ENABLED:false}
    jwt:
      secret: ${JWT_SECRET:eap-enterprise-agent-platform-jwt-secret-key-must-be-256-bits-long!!}
      expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  show-actuator: false

feign:
  client:
    config:
      bid-analysis-service:
        connect-timeout: 5000
        read-timeout: 120000

logging:
  config: classpath:logback-spring.xml
  # 日志目录（可通过环境变量覆盖）
  # 对应 logback-spring.xml 中的 ${LOG_HOME}
  # 生产部署示例：-DLOG_HOME=/var/log/eap
  # 以下 level 仅作 IDE / 单元测试时的快速覆盖，正式级别由 logback-spring.xml 管理
  level:
    com.enterprise.agent: INFO
