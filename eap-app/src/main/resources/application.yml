server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: eap-app
  # Spring Boot 4.x 原生 Nacos 配置导入（不依赖 bootstrap 机制）
  config:
    import:
      - optional:nacos:common.yml
      - optional:nacos:eap-app.yml
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yml
        fail-fast: false
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:true}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        fail-fast: false
# 应用级配置（minio/security 使用 eap 前缀，与代码一致）
eap:
  business:
    chat:
      auto-ocr:
        # autoOcr 调用方式：direct=直接调用工具Bean；agent=通过 ToolRegistry 统一入口调用
        invoke-mode: direct
  llm:
    provider: openai
  tools:
    zhengyan:
      platform:
        enabled: true
        timeout-ms: 600000
        convert:
          mode: pure-java
          max-pages: 200
          dpi: 160
        img2text:
          max-images-per-call: 2
        # 流水线语义分析时正言 API 的 user_id（必填字段，不可为空）
        pipeline-user-id: ${ZHENGYAN_PIPELINE_USER_ID:pipeline-ocr}
        # 通用 Header（两个接口共用）——凭证通过环境变量注入，禁止硬编码到代码/配置文件
        # ⚠️ 凭证必须通过环境变量注入，禁止硬编码到代码/配置文件
        # 示例：export ZHENGYAN_AUTHORIZATION="Bearer sk-xxx"
        authorization: ${ZHENGYAN_AUTHORIZATION:}
        app-id: ${ZHENGYAN_APP_ID_PLATFORM:G209-test}
        # img2text 可选模型类型: AzureGPT-4o / AzureGPT4-turbo-vision
        default-model-type: ${ZHENGYAN_DEFAULT_MODEL_TYPE:qwen2-5-vl-72b-com}
        endpoints:
          img2text: ${ZHENGYAN_IMG2TEXT_ENDPOINT:http://10.8.192.80:17500/ability/multimodal/v2/img2text}
          professional-qa: ${ZHENGYAN_PROFESSIONAL_QA_ENDPOINT:https://zhengyan.sinosig.com/ai/ability/professional/v1/qa}
    dazhi:
      ocr:
        # 是否启用大智部通用OCR工具 DazhiOcrTool
        enabled: true
        # 通用OCR识别地址，对应原 external.ocr.generalOcrUrl
        general-url: https://bigdata-ocr-cluster.sinosig.com/general_recognition
        # appCode，默认沿用原项目常量，可按环境覆盖
        app-code: ${DAZHI_OCR_APP_CODE:G209-GHQ-CLM-JIHEFENGXIANJIQIREN}
        # HTTP 请求超时时间（毫秒）
        timeout-ms: ${DAZHI_OCR_TIMEOUT_MS:20000}
  http:
    # TCP 连接建立超时（毫秒），供 HttpClientConfig 使用
    connect-timeout-ms: 5000
    jackson:
      # MVC @RequestBody 解析（tools.jackson）单字符串最大长度，如 attachments.base64
      # 默认 20MB，base64 图片场景可通过环境变量调大，不建议超过 50MB（DoS 风险）
      max-string-length: ${JACKSON_MAX_STRING_LENGTH:20000000}
  minio:
    enabled: ${MINIO_ENABLED:true}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket-name: ${MINIO_BUCKET:test}
  pipeline:
    # 阶段顺序固定：OCR → 语义分析 → 相似度对比；仅通过下列开关跳过（不可调换顺序）
    ocr:
      # false 时提交批次后不自动启动 OCR，需手动触发 triggerOcrPhase（默认 true）
      enabled: ${PIPELINE_OCR_ENABLED:true}
    analysis:
      # false 时跳过正言多模态分析；若仍开启对比则 OCR 结束后直接进入相似度
      enabled: ${PIPELINE_ANALYSIS_ENABLED:true}
      # 单次正言 img2text 请求最多带几张分片图；=1 表示每页单独一次大模型调用（多页会多次请求）
      max-images-per-file: ${PIPELINE_MAX_IMAGES_PER_FILE:2}
      # 语义分析最多处理多少页（分片顺序截断）；与上一项配合：总调用次数约 ceil(页数/max-images-per-file)
      max-total-analysis-pages: ${PIPELINE_MAX_TOTAL_ANALYSIS_PAGES:100}
      # 正言 img2text 的 text 使用哪套模板，对应下方 prompts.templates 的键。
      # 默认 default（代码内置）；使用投标模板：bid_screening。环境变量名见 com.enterprise.agent.business.chat.config.PipelineEnv#PIPELINE_ANALYSIS_MULTIMODAL_PROMPT_KEY
      multimodal-prompt-key: ${PIPELINE_ANALYSIS_MULTIMODAL_PROMPT_KEY:default}
    # 多模态话术模板（整站生效；Nacos 可覆盖同名路径）。键与 analysis.multimodal-prompt-key 对应。
    prompts:
      templates:
        bid_screening: |
          请从投标文档图片中提取信息，严格只输出 JSON，不要包含任何解释文字：
          {
            "doc_type": "BUSINESS_LICENSE|QUOTATION|CONTRACT|INVOICE|SEAL_PAGE|OTHER",
            "doc_type_label": "与 doc_type 对应的中文证件或文档类型名称，如：营业执照、报价单、合同、发票等",
            "has_stamp": true|false,
            "stamp_text": "公章文字，无则null",
            "company_name": "公司/单位名称，无则null",
            "license_no": "营业执照统一社会信用代码18位，无则null",
            "total_amount": 金额数字（元，无则null）,
            "key_dates": ["YYYY-MM-DD", ...],
            "summary": "文档内容摘要，100字以内"
          }
        # 营业执照、安全生产许可证、建筑业资质证书等：固定列 + 其余进 structured_extra（不用于报价/分项表，报价请用 quotation 模板）
        certificates: |
          请识别中国各类企业证件图片，严格只输出一个 JSON，不要解释文字。优先判断证件类型，填 doc_type 与 doc_type_label（中文）；能识别的统一社会信用代码填 license_no；企业/单位名称填 company_name。
          {
            "doc_type": "BUSINESS_LICENSE|WORK_SAFETY_LICENSE|CONSTRUCTION_QUALIFICATION|QUOTATION|CONTRACT|INVOICE|SEAL_PAGE|OTHER",
            "doc_type_label": "证件类型的中文全称，如：营业执照、安全生产许可证、建筑业企业资质证书、食品经营许可证等，须与图片实际类型一致",
            "has_stamp": true|false,
            "stamp_text": "可见公章上的文字，无则null",
            "company_name": "企业名称或单位名称，无则null",
            "license_no": "统一社会信用代码18位；若无则填证书编号或许可证编号",
            "total_amount": null,
            "key_dates": ["有效期起止、发证日期等原文中出现的日期"],
            "summary": "50字以内一句话摘要",
            "certificate_no": "非统一社会信用代码时的编号，如 D237332845、安许证字号",
            "legal_representative": "法定代表人或主要负责人，无则null",
            "registered_capital": "注册资本原文，无则null",
            "address": "住所或详细地址，无则null",
            "validity_text": "有效期原文",
            "issuing_authority": "发证机关，无则null",
            "qualification_items": ["资质类别及等级等多行，可为空数组"],
            "scope_or_permit": "许可范围或许可内容原文，无则null"
          }
          固定列：doc_type、has_stamp、stamp_text、company_name、license_no、total_amount、key_dates、summary；doc_type_label 与其它扩展字段将写入 structured_extra。
        # 居民身份证人像面/国徽面
        id_card: |
          请识别中国居民身份证图片（人像面或国徽面），严格只输出一个 JSON，不要解释文字。
          {
            "doc_type": "ID_CARD",
            "doc_type_label": "中华人民共和国居民身份证（人像面或国徽面，与 card_side 一致）",
            "card_side": "face|back",
            "has_stamp": false,
            "stamp_text": null,
            "company_name": null,
            "license_no": null,
            "total_amount": null,
            "key_dates": [],
            "summary": "30字以内说明正反面及是否清晰",
            "holder_name": "姓名，人像面",
            "gender": "性别",
            "ethnicity": "民族",
            "birth_date": "出生日期原文",
            "address": "住址，人像面",
            "id_number": "18位公民身份号码",
            "issuing_authority": "签发机关，国徽面",
            "valid_period": "有效期限原文，国徽面"
          }
          人像面以 holder_name、id_number、address 为主；国徽面以 issuing_authority、valid_period 为主；未出现的字段填 null。
        # 报价/投标文件（分项报价表、投标函等），勿与 certificates/id_card 混用
        quotation: |
          请识别中国招投标/政府采购类「报价、投标、分项报价表」等文档页面图片，严格只输出一个 JSON，不要解释文字。
          请尽量从当前能看到的页面中提取表格行；行数很多时可提取前 40 行并设 "line_items_truncated": true。
          {
            "doc_type": "QUOTATION",
            "doc_type_label": "文档类型中文描述，如：报价单、投标报价表、分项报价表、报价一览表等",
            "has_stamp": true|false,
            "stamp_text": "公章文字，无则null",
            "company_name": "投标/供应商单位名称",
            "license_no": "统一社会信用代码，无则null",
            "total_amount": 报价总价（元，数字，无则null）,
            "key_dates": ["投标截止日、开标日、交货期等原文日期"],
            "summary": "项目与报价要点，300字以内",
            "project_name": "项目名称或标段名称",
            "tender_no": "项目/招标编号",
            "package_name": "包号或分标名称，无则null",
            "buyer_name": "采购人/招标人，无则null",
            "contact_person": "联系人",
            "contact_phone": "联系电话",
            "line_items": [
              { "line_no": 行号, "name": "货物或服务名称", "spec": "规格型号", "brand": "品牌", "unit": "单位", "quantity": 数量, "unit_price": 单价, "amount": 金额, "remark": "行备注" }
            ],
            "line_items_truncated": false,
            "subtotal": 小计（元，无则null）,
            "tax_rate": "税率原文如13%",
            "tax_amount": 税额（元，无则null）,
            "delivery_period": "交货期/工期原文",
            "payment_terms": "付款方式原文",
            "warranty": "质保期原文",
            "currency": "CNY",
            "remarks": "其它重要说明"
          }
    compare:
      # false 时跳过 Python 相似度对比；语义分析结束后批次直接 DONE（若分析也关闭则 OCR 后 DONE）
      enabled: ${PIPELINE_COMPARE_ENABLED:true}
    # OCR 失败数 / 总文件数 超过该比例则终止批次（0.5 = 超过一半才终止）
    fail-tolerance-ratio: ${PIPELINE_FAIL_TOLERANCE_RATIO:0.5}
    scheduler:
      # false 时禁用定时补偿任务（测试环境或不需要自动补跑的场景）
      enabled: ${PIPELINE_SCHEDULER_ENABLED:true}
      interval-ms: ${PIPELINE_SCHEDULER_INTERVAL_MS:60000}
      # 各超时阈值（秒），见 OcrPipelineScheduler
      pending-stale-seconds: ${PIPELINE_PENDING_STALE_SECONDS:120}
      processing-stale-seconds: ${PIPELINE_PROCESSING_STALE_SECONDS:1800}
      done-stale-seconds: ${PIPELINE_DONE_STALE_SECONDS:300}
    chat:
      # 触发 Agent 工具调用的关键词（大小写不敏感）；命中任意一个则 shouldUseTools()=true
      # 支持 Nacos 动态刷新，无需重启服务
      org-tool-keywords:
        - orgcode
        - 机构
        - 风控
        - 风险
        - 监测
        - 监控
        - 线索
        - 疑点
        - 告警
        - analysis
        - analyze
        - monitor
        - clue
  security:
    enabled: ${SECURITY_ENABLED:false}
    jwt:
      secret: ${JWT_SECRET:eap-enterprise-agent-platform-jwt-secret-key-must-be-256-bits-long!!}
      expiration-ms: 86400000
  ops:
    agent:
      nacos-mcp:
        # 一期默认关闭；开启后 Ops Playbook 会调用外部 Nacos MCP 读取配置与历史
        enabled: ${OPS_NACOS_MCP_ENABLED:false}
        base-url: ${OPS_NACOS_MCP_BASE_URL:}
        token: ${OPS_NACOS_MCP_TOKEN:}
        timeout-ms: ${OPS_NACOS_MCP_TIMEOUT_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  show-actuator: false

feign:
  client:
    config:
      bid-analysis-service:
        connect-timeout: 5000
        read-timeout: 120000

logging:
  config: classpath:logback-spring.xml
  # 日志目录（可通过环境变量覆盖）
  # 对应 logback-spring.xml 中的 ${LOG_HOME}
  # 生产部署示例：-DLOG_HOME=/var/log/eap
  # 以下 level 仅作 IDE / 单元测试时的快速覆盖，正式级别由 logback-spring.xml 管理
  level:
    com.enterprise.agent: INFO
